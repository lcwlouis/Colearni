# Sample docker-compose.yaml file for Sapientian

version: '3.8'

services:
  # Redis for SearXNG caching
  redis:
    image: redis:7-alpine
    container_name: sapientian-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - sapientian-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SearXNG search engine
  searxng:
    build:
      context: ./searxng
      dockerfile: Dockerfile
    container_name: sapientian-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./config/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8080}
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sapientian-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Sapientian App
  sapientian-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sapientian-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SEARXNG_API_URL=http://searxng:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
    depends_on:
      searxng:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sapientian-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: sapientian-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      - sapientian-app
      - searxng
    networks:
      - sapientian-network
    profiles:
      - production

volumes:
  redis_data:

networks:
  sapientian-network:
    driver: bridge