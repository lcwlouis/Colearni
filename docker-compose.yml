services:
  db:
    image: pgvector/pgvector:pg16
    container_name: colearni-db
    environment:
      POSTGRES_DB: colearni
      POSTGRES_USER: colearni
      POSTGRES_PASSWORD: colearni
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colearni -d colearni"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: colearni-phoenix
    profiles: ["observability"]
    ports:
      - "6006:6006"   # Phoenix UI & OTLP HTTP receiver
    environment:
      PHOENIX_WORKING_DIR: /phoenix-data
    volumes:
      - phoenix-data:/phoenix-data

volumes:
  pgdata:
  phoenix-data:
