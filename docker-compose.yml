services:
  db:
    image: pgvector/pgvector:pg16
    container_name: colearni-db
    environment:
      POSTGRES_DB: colearni
      POSTGRES_USER: colearni
      POSTGRES_PASSWORD: colearni
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colearni -d colearni"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
